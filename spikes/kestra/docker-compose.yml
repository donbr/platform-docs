# SECURITY (local dev spike only — read before exposing anywhere):
#   - Kestra OSS has NO authentication and its flows run arbitrary shell. Both ports
#     below are bound to 127.0.0.1 so the stack is reachable ONLY from this host.
#     Do NOT change these to 0.0.0.0 / a bare "host:container" form, and do NOT put
#     this stack behind a public ingress without adding auth (EE/OIDC) first.
#   - The repo is bind-mounted into the Kestra container (needed so `uv run scripts/...`
#     works). That mount includes any repo-root `.env` — treat the container as trusted
#     and never load untrusted flows into it.
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: platform_docs
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    ports:
      - "127.0.0.1:5433:5432"   # localhost-only; 5432 is taken by agent-memory-postgres
    volumes:
      - pg_spike:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra -d platform_docs"]
      interval: 5s
      timeout: 3s
      retries: 10

  kestra:
    image: kestra/kestra:v1.3.29   # PINNED (research-flagged) — NOT :latest. Standard tag bundles plugins (postgresql JDBC + googleworkspace); do NOT use the -no-plugins variant. v1.3.29 = v1.3 = latest-lts as of 2026-07-22.
    command: server standalone
    restart: unless-stopped
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"   # localhost-only — no auth on Kestra OSS; never expose to a network
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /kestra-storage   # persisted via the kestra_storage named volume (not ephemeral /tmp)
          security:
            basic-auth:
              enabled: true
              username: "${KESTRA_BASIC_AUTH_USERNAME}"
              password: "${KESTRA_BASIC_AUTH_PASSWORD}"
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/platform_docs?currentSchema=kestra_system
            username: kestra
            password: kestra
    env_file:
      - .env
    volumes:
      - ../../:/repo        # mount repo at /repo (NOT /app — that holds the kestra binary)
      - kestra_storage:/kestra-storage   # persist internal storage (task logs/outputs) across restarts
    # NOTE: do not set working_dir; the image's /app WORKDIR holds the kestra binary.
    # Flow shell tasks `cd /repo` themselves (Process runner uses its own temp cwd).

volumes:
  pg_spike:
  kestra_storage:
